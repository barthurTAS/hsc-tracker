<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSC Multimedia Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F0;color:#1A1916;min-height:100vh}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:#fff;border:1px solid #E2E0D8;border-radius:14px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.auth-logo{width:44px;height:44px;background:#1D6B4E;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:1.5rem}
.auth-card h1{font-size:22px;font-weight:600;margin-bottom:4px}
.auth-card .sub{font-size:13px;color:#6B6860;margin-bottom:1.5rem}
.auth-tabs{display:flex;border:1px solid #E2E0D8;border-radius:8px;overflow:hidden;margin-bottom:1.5rem}
.auth-tabs button{flex:1;padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;border:none;background:none;cursor:pointer;color:#6B6860;transition:all .15s}
.auth-tabs button.active{background:#1A1916;color:#fff;font-weight:500}
label{display:block;font-size:13px;font-weight:500;color:#6B6860;margin-bottom:5px}
.inp{width:100%;padding:10px 12px;border:1.5px solid #E2E0D8;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:#F5F4F0;color:#1A1916;outline:none;margin-bottom:1rem}
.inp:focus{border-color:#1D6B4E;background:#fff}
.btn-green{width:100%;padding:11px;background:#1D6B4E;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.btn-green:hover{opacity:.9}
.auth-msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:1rem;display:none}
.auth-msg.err{background:#FEF0F0;color:#9B2626;display:block}
.auth-msg.ok{background:#E6F2EC;color:#1D6B4E;display:block}
/* APP */
#app{display:none}
.topbar{background:#fff;border-bottom:1px solid #E2E0D8;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.tlogo{width:28px;height:28px;background:#1D6B4E;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.tname{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-chip{font-size:12px;color:#6B6860;background:#F5F4F0;border:1px solid #E2E0D8;border-radius:20px;padding:4px 12px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-out{font-size:13px;background:#fff;border:1.5px solid #E2E0D8;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;color:#1A1916}
.btn-out:hover{background:#F5F4F0}
.layout{display:flex;max-width:1080px;margin:0 auto;padding:1.5rem;gap:1.25rem}
/* SIDEBAR */
.sidebar{width:220px;min-width:220px}
.scard{background:#fff;border:1px solid #E2E0D8;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.slabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#9E9C96;margin-bottom:.75rem}
.big-pct{font-size:34px;font-weight:600;color:#1D6B4E;line-height:1}
.big-sub{font-size:13px;color:#6B6860;margin-top:4px;margin-bottom:.75rem}
.prog-track{height:6px;background:#E2E0D8;border-radius:3px;overflow:hidden;margin-bottom:1.25rem}
.prog-fill{height:100%;background:#1D6B4E;border-radius:3px;transition:width .3s}
.cat-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cat-bar{height:3px;background:#E2E0D8;border-radius:2px;margin-bottom:10px;overflow:hidden}
.cat-fill{height:100%;border-radius:2px;transition:width .3s}
.nav-btn{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:13px;color:#6B6860;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:2px;transition:all .15s}
.nav-btn:hover{background:#F5F4F0;color:#1A1916}
.nav-btn.active{background:#E6F2EC;color:#1D6B4E;font-weight:500}
/* CONTENT */
.content{flex:1;min-width:0}
.page-head{margin-bottom:1rem}
.page-head h2{font-size:19px;font-weight:600}
.page-head p{font-size:13px;color:#6B6860;margin-top:2px}
.info-bar{background:#EBF2FB;border:1px solid #BDD4EE;border-radius:8px;padding:10px 14px;font-size:13px;color:#1A4F8A;margin-bottom:1rem;line-height:1.5}
.warn-bar{background:#FEF3E2;border:1px solid #E8C88A;border-radius:8px;padding:10px 14px;font-size:13px;color:#92580A;margin-bottom:1rem;line-height:1.5}
/* SECTIONS */
.sec-card{background:#fff;border:1px solid #E2E0D8;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.sec-head:hover{background:#FAFAF8}
.sec-head-left{display:flex;align-items:center;gap:10px}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.bf{background:#E6F2EC;color:#1D6B4E}
.bp{background:#EBF2FB;color:#1A4F8A}
.be{background:#FEF3E2;color:#92580A}
.bt{background:#EEEDFE;color:#3C3489}
.bti{background:#EAF3DE;color:#27500A}
.sec-title{font-size:14px;font-weight:500}
.sec-count{font-size:12px;color:#9E9C96}
.chev{font-size:11px;color:#9E9C96;transition:transform .2s;display:inline-block;margin-left:6px}
.chev.open{transform:rotate(90deg)}
.sec-body{display:none;border-top:1px solid #E2E0D8}
.sec-body.open{display:block}
/* ITEMS */
.c-item{display:flex;align-items:flex-start;gap:14px;padding:12px 16px;border-bottom:1px solid #F0EFE8}
.c-item:last-child{border-bottom:none}
.c-item:hover{background:#FAFAF8}
.chkbox{width:22px;height:22px;min-width:22px;border:2px solid #C8C5BB;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;transition:all .15s;margin-top:1px;font-size:14px;color:transparent;font-weight:700;line-height:1}
.chkbox:hover{border-color:#1D6B4E;background:#E6F2EC}
.chkbox.done{background:#1D6B4E;border-color:#1D6B4E;color:#fff}
.c-body{flex:1;min-width:0}
.c-text{font-size:14px;color:#1A1916;line-height:1.5}
.c-text.done{color:#9E9C96;text-decoration:line-through}
.c-note{font-size:12px;color:#6B6860;margin-top:3px;line-height:1.5}
.c-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid #E2E0D8;color:#6B6860}
.pill.hi{background:#E6F2EC;color:#1D6B4E;border-color:#A8D9BF}
.pill.due{background:#FEF0F0;color:#9B2626;border-color:#F5BABA}
/* UPLOADS */
.ucard{background:#fff;border:1px solid #E2E0D8;border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ucard h3{font-size:15px;font-weight:600;margin-bottom:4px}
.ucard p{font-size:13px;color:#6B6860;margin-bottom:1.25rem}
.drop-zone{border:2px dashed #C8C5BB;border-radius:8px;padding:2rem;text-align:center;cursor:pointer;background:#F5F4F0;transition:all .15s;margin-bottom:1rem}
.drop-zone:hover{border-color:#1D6B4E;background:#E6F2EC}
.drop-icon{font-size:28px;margin-bottom:8px}
.link-row{display:flex;gap:8px;margin-bottom:8px}
.link-row .inp{margin-bottom:0;flex:1}
.btn-add{padding:10px 16px;background:#1D6B4E;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.u-list{list-style:none}
.u-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#F5F4F0;border:1px solid #E2E0D8;border-radius:8px;margin-bottom:6px}
.u-icon{font-size:18px;min-width:22px;text-align:center}
.u-info{flex:1;min-width:0}
.u-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-meta{font-size:11px;color:#9E9C96;margin-top:1px}
.u-link{font-size:12px;color:#1D6B4E;text-decoration:none}
.u-link:hover{text-decoration:underline}
.u-del{background:none;border:none;color:#9E9C96;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.u-del:hover{color:#9B2626;background:#FEF0F0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;background:#fff;border:1px solid #E2E0D8;border-radius:8px;overflow:hidden}
.tbl th{padding:9px 13px;background:#F5F4F0;color:#6B6860;font-weight:500;text-align:left;font-size:12px}
.tbl td{padding:9px 13px;border-top:1px solid #E2E0D8;vertical-align:top;line-height:1.5}
.sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:1rem 1.25rem}
.sw-card{background:#F5F4F0;border:1px solid #E2E0D8;border-radius:8px;padding:12px}
.sw-name{font-size:13px;font-weight:500;margin-bottom:4px}
.sw-desc{font-size:12px;color:#6B6860;line-height:1.45}
.band-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #E2E0D8}
.band-row:last-child{border-bottom:none}
.band-dot{width:10px;height:10px;min-width:10px;border-radius:50%;margin-top:4px}
.band-name{font-size:13px;font-weight:500;min-width:58px}
.band-desc{font-size:13px;color:#6B6860;line-height:1.5}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1A1916;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.spinner{text-align:center;padding:2rem;color:#9E9C96;font-size:13px}
</style>
</head>
<body>

<div id="auth-screen" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">&#128203;</div>
    <h1>HSC Multimedia Tracker</h1>
    <p class="sub">Industrial Technology Stage 6 &mdash; Year 12</p>
    <div class="auth-tabs">
      <button id="btn-login" class="active" onclick="authTab('login')">Sign in</button>
      <button id="btn-signup" onclick="authTab('signup')">Create account</button>
    </div>
    <div id="form-login">
      <label>School email</label>
      <input class="inp" type="email" id="li-email" placeholder="you@shirechristian.nsw.edu.au">
      <label>Password</label>
      <input class="inp" type="password" id="li-pw" placeholder="Password">
      <button class="btn-green" onclick="doLogin()">Sign in</button>
    </div>
    <div id="form-signup" style="display:none">
      <label>Full name</label>
      <input class="inp" type="text" id="su-name" placeholder="Your full name">
      <label>School email</label>
      <input class="inp" type="email" id="su-email" placeholder="you@shirechristian.nsw.edu.au">
      <label>Password (min 8 characters)</label>
      <input class="inp" type="password" id="su-pw" placeholder="Password">
      <button class="btn-green" onclick="doSignup()">Create account</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="tlogo">&#128203;</div>
      <span class="tname">HSC Multimedia Tracker</span>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-chip"></span>
      <button class="btn-out" id="btn-signout">Sign out</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="scard">
        <div class="slabel">Overall progress</div>
        <div class="big-pct" id="ov-pct">0%</div>
        <div class="big-sub" id="ov-sub">0 of 0 tasks</div>

        <div class="cat-row"><span style="color:#6B6860">Folio</span><span id="cv-folio" style="font-weight:500">0/0</span></div>
        <div class="cat-bar"><div class="cat-fill" id="cb-folio" style="width:0%;background:#1D6B4E"></div></div>
        <div class="cat-row"><span style="color:#6B6860">Production</span><span id="cv-prod" style="font-weight:500">0/0</span></div>
        <div class="cat-bar"><div class="cat-fill" id="cb-prod" style="width:0%;background:#1A4F8A"></div></div>
        <div class="cat-row"><span style="color:#6B6860">Exam</span><span id="cv-exam" style="font-weight:500">0/0</span></div>
        <div class="cat-bar"><div class="cat-fill" id="cb-exam" style="width:0%;background:#92580A"></div></div>
        <div class="cat-row"><span style="color:#6B6860">Theory</span><span id="cv-theory" style="font-weight:500">0/0</span></div>
        <div class="cat-bar"><div class="cat-fill" id="cb-theory" style="width:0%;background:#3C3489"></div></div>
      </div>
      <div class="scard">
        <div class="slabel">Sections</div>
        <button class="nav-btn active" onclick="goTab('folio',this)">&#128193; Folio development</button>
        <button class="nav-btn" onclick="goTab('production',this)">&#127916; Practical</button>
        <button class="nav-btn" onclick="goTab('exam',this)">&#9999;&#65039; HSC exam</button>
        <button class="nav-btn" onclick="goTab('theory',this)">&#128218; Theory</button>
        <button class="nav-btn" onclick="goTab('products',this)">&#128295; Products &amp; tools</button>
        <button class="nav-btn" onclick="goTab('time',this)">&#128197; Time plan</button>
        <button class="nav-btn" onclick="goTab('uploads',this)">&#9729;&#65039; My uploads</button>
      </div>
    </aside>
    <main class="content" id="main-content"></main>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── AUTH ───────────────────────────────────────────────────
function authTab(t) {
  document.getElementById('form-login').style.display = t==='login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = t==='signup' ? 'block' : 'none';
  document.getElementById('btn-login').classList.toggle('active', t==='login');
  document.getElementById('btn-signup').classList.toggle('active', t==='signup');
  clearAuthMsg();
}
function showAuthMsg(text, type) {
  var el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}
function clearAuthMsg() {
  document.getElementById('auth-msg').className = 'auth-msg';
}
async function doLogin() {
  var email = document.getElementById('li-email').value.trim();
  var pw = document.getElementById('li-pw').value;
  if (!email || !pw) { showAuthMsg('Please enter your email and password.', 'err'); return; }
  var res = await sb.auth.signInWithPassword({ email: email, password: pw });
  if (res.error) showAuthMsg(res.error.message, 'err');
}
async function doSignup() {
  var name = document.getElementById('su-name').value.trim();
  var email = document.getElementById('su-email').value.trim();
  var pw = document.getElementById('su-pw').value;
  if (!name || !email || !pw) { showAuthMsg('Please fill in all fields.', 'err'); return; }
  if (pw.length < 8) { showAuthMsg('Password must be at least 8 characters.', 'err'); return; }
  var res = await sb.auth.signUp({ email: email, password: pw, options: { data: { full_name: name } } });
  if (res.error) showAuthMsg(res.error.message, 'err');
  else showAuthMsg('Account created! You can now sign in.', 'ok');
}

// ── SIGN OUT ───────────────────────────────────────────────
document.getElementById('btn-signout').onclick = function() {
  Object.keys(localStorage).forEach(function(k) {
    if (k.indexOf('supabase') > -1 || k.indexOf('sb-') > -1 || k.indexOf('hsc-student-session') > -1) {
      localStorage.removeItem(k);
    }
  });
  window.location.reload();
};

// ── SESSION ────────────────────────────────────────────────
sb.auth.onAuthStateChange(async function(event, session) {
  console.log('Auth event:', event);
  if (event === 'SIGNED_OUT') {
    USER = null;
    CHECKS = {};
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-content').innerHTML = '';
    clearAuthMsg();
    return;
  }
  if (session && session.user && !USER) {
    USER = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-chip').textContent = session.user.email;
    await loadChecks();
    renderFolio();
  }
});

// ── CHECKLIST DB ───────────────────────────────────────────
async function loadChecks() {
  CHECKS = {};
  var res = await sb.from('checklist_items').select('item_id').eq('user_id', USER.id).eq('checked', true);
  if (res.data) res.data.forEach(function(r) { CHECKS[r.item_id] = true; });
}
async function saveTick(itemId, val) {
  await sb.from('checklist_items').upsert(
    { user_id: USER.id, item_id: itemId, checked: val, checked_at: val ? new Date().toISOString() : null },
    { onConflict: 'user_id,item_id' }
  );
}
function tick(itemId) {
  CHECKS[itemId] = !CHECKS[itemId];
  var box = document.getElementById('chk-' + itemId);
  var txt = document.getElementById('txt-' + itemId);
  if (box) { box.classList.toggle('done', CHECKS[itemId]); box.textContent = CHECKS[itemId] ? '\u2713' : ''; }
  if (txt) txt.classList.toggle('done', CHECKS[itemId]);
  saveTick(itemId, CHECKS[itemId]);
  updateProgress();
}

function goTab(name, btn) {
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  var mc = document.getElementById('main-content');
  mc.innerHTML = '';
  if (name === 'folio') renderFolio();
  else if (name === 'production') renderProduction();
  else if (name === 'exam') renderExam();

  else if (name === 'products') renderProducts();
  else if (name === 'time') renderTime();
  else if (name === 'uploads') renderUploads();
}

// ── SECTION BUILDER ────────────────────────────────────────
function buildSections(tabName) {
  var mc = document.getElementById('main-content');
  SECTIONS.filter(function(s) { return s.tab === tabName; }).forEach(function(sec) {
    var done = sec.items.filter(function(it) { return CHECKS[it.id]; }).length;
    var html = '<div class="sec-card">';
    html += '<div class="sec-head" onclick="toggleSec(\'' + sec.id + '\')">';
    html += '<div class="sec-head-left"><span class="badge ' + sec.badge + '">' + sec.label + '</span><span class="sec-title">' + sec.title + '</span></div>';
    html += '<div style="display:flex;align-items:center"><span class="sec-count" id="cnt-' + sec.id + '">' + done + '/' + sec.items.length + '</span><span class="chev open" id="chev-' + sec.id + '">&#9654;</span></div>';
    html += '</div>';
    html += '<div class="sec-body open" id="body-' + sec.id + '">';
    sec.items.forEach(function(it) { html += buildItem(it); });
    html += '</div></div>';
    mc.insertAdjacentHTML('beforeend', html);
  });
}
function buildItem(it) {
  var done = CHECKS[it.id];
  var pillsHtml = '';
  if (it.pills) it.pills.forEach(function(p) { pillsHtml += '<span class="pill' + (it.due ? ' due' : '') + '">' + p + '</span>'; });
  if (it.hi) pillsHtml += '<span class="pill hi">High impact</span>';
  return '<div class="c-item">' +
    '<div class="chkbox' + (done ? ' done' : '') + '" id="chk-' + it.id + '" onclick="tick(\'' + it.id + '\')">' + (done ? '\u2713' : '') + '</div>' +
    '<div class="c-body">' +
    '<div class="c-text' + (done ? ' done' : '') + '" id="txt-' + it.id + '">' + it.text + '</div>' +
    (it.note ? '<div class="c-note">' + it.note + '</div>' : '') +
    (pillsHtml ? '<div class="c-pills">' + pillsHtml + '</div>' : '') +
    '</div></div>';
}
function toggleSec(id) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  if (!body) return;
  var open = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

async function uploadPDF(file) {
  if (!file || !USER) return;
  if (file.size > 52428800) { showToast('File too large - max 50MB'); return; }
  var st = document.getElementById('upload-status');
  st.style.display = 'block'; st.textContent = 'Uploading...';
  var path = USER.id + '/' + Date.now() + '_' + file.name;
  var res = await sb.storage.from('folio-uploads').upload(path, file, { contentType: 'application/pdf' });
  if (res.error) { st.textContent = 'Upload failed: ' + res.error.message; return; }
  await sb.from('student_uploads').insert({ user_id: USER.id, type: 'pdf', name: file.name, path: path, uploaded_at: new Date().toISOString() });
  st.style.display = 'none';
  showToast('Uploaded!');
  loadUploadList();
}
async function addLink() {
  if (!USER) return;
  var url = document.getElementById('link-url').value.trim();
  var label = document.getElementById('link-label').value.trim() || 'Document link';
  if (!url) { showToast('Please paste a URL.'); return; }
  await sb.from('student_uploads').insert({ user_id: USER.id, type: 'link', name: label, url: url, uploaded_at: new Date().toISOString() });
  document.getElementById('link-url').value = '';
  document.getElementById('link-label').value = '';
  showToast('Link added!');
  loadUploadList();
}
async function loadUploadList() {
  var list = document.getElementById('u-list');
  var loading = document.getElementById('u-loading');
  if (!list) return;
  var res = await sb.from('student_uploads').select('*').eq('user_id', USER.id).order('uploaded_at', { ascending: false });
  if (loading) loading.style.display = 'none';
  if (!res.data || !res.data.length) { list.innerHTML = '<li style="font-size:13px;color:#9E9C96;padding:6px 0">No uploads yet.</li>'; return; }
  list.innerHTML = res.data.map(function(u) {
    var d = new Date(u.uploaded_at);
    var ds = d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
    return '<li class="u-item"><span class="u-icon">' + (u.type === 'pdf' ? '&#128196;' : '&#128279;') + '</span>' +
      '<div class="u-info"><div class="u-name">' + u.name + '</div>' +
      '<div class="u-meta">' + ds + (u.url ? ' &middot; <a href="' + u.url + '" target="_blank" class="u-link">Open</a>' : '') + '</div></div>' +
      '<button class="u-del" onclick="delUpload(' + u.id + ',\'' + (u.path || '') + '\',\'' + u.type + '\')">&#10005;</button></li>';
  }).join('');
}
async function delUpload(id, path, type) {
  if (!confirm('Remove this item?')) return;
  if (type === 'pdf' && path) await sb.storage.from('folio-uploads').remove([path]);
  await sb.from('student_uploads').delete().eq('id', id).eq('user_id', USER.id);
  showToast('Removed.');
  loadUploadList();
}

// ── PROGRESS ───────────────────────────────────────────────
function updateProgress() {
  var cats = { folio: { d:0, t:0 }, prod: { d:0, t:0 }, exam: { d:0, t:0 }, theory: { d:0, t:0 } };
  var total = 0, done = 0;
  SECTIONS.forEach(function(sec) {
    sec.items.forEach(function(it) {
      total++;
      if (CHECKS[it.id]) done++;
      var c = cats[it.cat];
      if (c) { c.t++; if (CHECKS[it.id]) c.d++; }
    });
  });
  var pct = total ? Math.round(done / total * 100) : 0;
  var op = document.getElementById('ov-pct'); if (op) op.textContent = pct + '%';
  var os = document.getElementById('ov-sub'); if (os) os.textContent = done + ' of ' + total + ' tasks';
  var ob = document.getElementById('ov-bar'); if (ob) ob.style.width = pct + '%';
  Object.keys(cats).forEach(function(key) {
    var v = cats[key];
    var p = v.t ? Math.round(v.d / v.t * 100) : 0;
    var cv = document.getElementById('cv-' + key); if (cv) cv.textContent = v.d + '/' + v.t;
    var cb = document.getElementById('cb-' + key); if (cb) cb.style.width = p + '%';
  });
  SECTIONS.forEach(function(sec) {
    var el = document.getElementById('cnt-' + sec.id);
    if (el) el.textContent = sec.items.filter(function(it) { return CHECKS[it.id]; }).length + '/' + sec.items.length;
  });
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
